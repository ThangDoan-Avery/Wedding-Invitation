<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiệp mời Hữu Thắng & Thu Trang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap&subset=vietnamese"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          radial-gradient(circle at 18% 18%, rgba(153, 98, 71, 0.1), transparent 28%),
          radial-gradient(circle at 84% 78%, rgba(21, 63, 42, 0.08), transparent 26%),
          #f7eee3;
        color: #7c4b38;
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
      }

      main {
        width: min(560px, 100%);
        padding: clamp(28px, 7vw, 44px) clamp(20px, 6vw, 38px);
        text-align: center;
        border: 1px solid rgba(124, 75, 56, 0.18);
        border-radius: 12px;
        background: rgba(255, 250, 244, 0.9);
        box-shadow: 0 20px 58px rgba(80, 48, 30, 0.14);
      }

      h1 {
        max-width: 480px;
        margin: 0 auto 28px;
        color: #8b563f;
        font-size: clamp(1.9rem, 7vw, 2.35rem);
        font-family: "Cormorant Garamond", "Times New Roman", serif;
        font-weight: 600;
        line-height: 1.18;
        letter-spacing: 0;
      }

      .actions {
        display: grid;
        gap: 14px;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 0 20px;
        border-radius: 999px;
        color: #fffaf4;
        background: #8b563f;
        box-shadow: 0 10px 24px rgba(139, 86, 63, 0.16);
        text-decoration: none;
        font-size: clamp(1.05rem, 4.5vw, 1.22rem);
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        font-weight: 700;
        line-height: 1.25;
        transition:
          background 160ms ease,
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      a:hover {
        background: #153f2a;
        box-shadow: 0 12px 28px rgba(21, 63, 42, 0.18);
        transform: translateY(-1px);
      }

      @media (max-width: 420px) {
        main {
          padding-inline: 18px;
        }

        a {
          min-height: 54px;
          padding-inline: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thiệp mời Hữu Thắng & Thu Trang</h1>
      <div class="actions">
        <a href="Wedding_invitation_Th.html">Mở thiệp mời của Thắng</a>
        <a href="Wedding_invitation_Tr.html">Mở thiệp mời của Trang</a>
      </div>
    </main>
  </body>
</html>
